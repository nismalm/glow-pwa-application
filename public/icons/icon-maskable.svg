<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cdde3f"/>
      <stop offset="100%" stop-color="#a8b92f"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background — maskable icons must have no transparent padding -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content in safe zone: centred within inner 80% (64px inset each side) -->
  <text x="256" y="310" font-size="200" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">✨</text>
</svg>
